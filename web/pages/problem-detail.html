<section class="stack">
	<div class="page-head">
		<h1 id="problem-title">题目详情</h1>
		<button id="btn-back-list" class="btn btn-ghost" type="button">返回列表</button>
	</div>

	<article class="card stack">
		<div id="problem-meta" class="toolbar muted"></div>
		<div id="problem-description"></div>
	</article>

	<article class="card stack">
		<h2>样例</h2>
		<div id="problem-samples"></div>
	</article>

	<article class="card stack">
		<div class="page-head">
			<h2>在线编程</h2>
			<div class="toolbar">
				<label for="language-select">语言</label>
				<select id="language-select"></select>
			</div>
		</div>

		<div class="editor-wrap">
			<div id="editor-host" class="editor-host" aria-label="代码编辑区"></div>
		</div>

		<div class="toolbar">
			<button id="btn-run" class="btn btn-ghost" type="button">运行测试（样例）</button>
			<button id="btn-submit" class="btn btn-accent" type="button">提交判题（全量）</button>
		</div>
	</article>
</section>
