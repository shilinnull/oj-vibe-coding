# OJ Vibe Coding server configuration (YAML)
# Minimal skeleton: fill values as needed.
# Optional: support environment placeholders like "${MYSQL_PASSWORD}" in your config loader.

server:
  host: 0.0.0.0
  port: 8080

mysql:
  host: 127.0.0.1
  port: 3306
  user: shilin
  password: 123456
  database: oj
  pool:
    max_connections: 10
    connect_timeout_ms: 2000

auth:
  jwt:
    secret: dev-only-change-this-secret
    expires_seconds: 3600

judge:
  max_concurrency: 4
  nsjail_config: ./config/nsjail.cfg
  work_dir: ./run/judge
  default_time_limit_ms: 1000
  default_memory_limit_kb: 262144

logging:
  level: debug
  to_stdout: false
  file: ./logs/
  max_file_size: 10   # 单文件上限（MB），达到后自动轮转压缩
  
