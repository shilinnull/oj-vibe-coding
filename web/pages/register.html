<section class="grid-two">
	<article class="card stack">
		<h1>创建账号</h1>
		<p class="muted">加入 OJ Vibe Coding，提交你的第一道题。</p>
		<div class="card">
			<h3>密码建议</h3>
			<p class="muted">至少 6 位，建议混合字母和数字。</p>
		</div>
	</article>

	<article class="card">
		<h2>注册</h2>
		<form id="register-form" class="stack">
			<div>
				<label for="register-username">用户名</label>
				<input id="register-username" name="username" autocomplete="username" required />
			</div>
			<div>
				<label for="register-email">邮箱（可选）</label>
				<input id="register-email" name="email" type="email" autocomplete="email" />
			</div>
			<div>
				<label for="register-password">密码</label>
				<input id="register-password" name="password" type="password" autocomplete="new-password" required />
			</div>
			<button id="register-submit" type="submit" class="btn btn-primary">注册并登录</button>
			<a href="#/login" data-link class="muted">已有账号？去登录</a>
		</form>
	</article>
</section>
