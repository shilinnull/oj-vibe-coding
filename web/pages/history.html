<section class="stack">
	<div class="page-head">
		<h1>提交历史</h1>
		<span id="history-user" class="muted"></span>
	</div>

	<article class="card table-wrap">
		<table>
			<thead>
				<tr>
					<th>提交ID</th>
					<th>题目ID</th>
					<th>语言ID</th>
					<th>模式</th>
					<th>状态</th>
					<th>耗时(ms)</th>
					<th>内存(KB)</th>
					<th>提交时间</th>
				</tr>
			</thead>
			<tbody id="history-body"></tbody>
		</table>
	</article>

	<div class="pager">
		<button id="history-prev" class="btn btn-ghost" type="button">上一页</button>
		<span id="history-pager-info" class="muted">第 1 页</span>
		<button id="history-next" class="btn btn-ghost" type="button">下一页</button>
	</div>
</section>
